upstream platform_api {
  server platform-api:9200;
  keepalive 32;
}

map $http_x_forwarded_proto $platform_forwarded_proto {
  default "";
  ~*^https$ "https";
}

map $platform_forwarded_proto $platform_edge_https {
  default 0;
  https 1;
}

server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 20m;

  if ($platform_edge_https = 0) { return 308 https://$host$request_uri; }

  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $platform_forwarded_proto;
    proxy_read_timeout 60s;
    proxy_pass http://platform_api;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
