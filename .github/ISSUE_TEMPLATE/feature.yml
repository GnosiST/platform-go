name: Feature request
description: Propose a focused, business-neutral improvement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem and proposed outcome
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Contract and compatibility impact
      description: Describe API, permission, persistence, migration and rollback effects.
    validations:
      required: true
